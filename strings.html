<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>糸 | Strings</title>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400&display=swap");
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#08090d;width:100vw;height:100vh;overflow:hidden;font-family:'Noto Sans JP',sans-serif;color:#e0e0e0}
        .wrap{display:flex;height:100vh}
        #container{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:10px;touch-action:none;position:relative}
        canvas{display:block}
        .panel{width:260px;background:#12131a;border-left:1px solid rgba(255,255,255,.06);padding:14px;overflow-y:auto;font-size:.75rem}
        .panel::-webkit-scrollbar{width:3px}
        .panel::-webkit-scrollbar-thumb{background:rgba(155,89,182,.3);border-radius:2px}
        .panel h3{font-size:.8rem;color:#9b59b6;margin-bottom:10px;letter-spacing:.05em}
        .row{display:flex;align-items:center;margin-bottom:8px}
        .row label{width:70px;color:#8a8a85;font-size:.7rem}
        .row input[type=range]{flex:1;margin:0 8px;height:3px;-webkit-appearance:none;background:rgba(255,255,255,.1);border-radius:2px;outline:none}
        .row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;background:#9b59b6;border-radius:50%;cursor:pointer}
        .row input[type=number]{width:48px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:3px;padding:3px;text-align:center;font-size:.7rem;color:#e0e0e0;font-family:monospace}
        .btn{width:100%;padding:7px;background:rgba(155,89,182,.2);border:1px solid rgba(155,89,182,.3);border-radius:4px;color:#b07cc6;font-size:.75rem;cursor:pointer;margin-top:6px}
        .btn:hover{background:rgba(155,89,182,.3)}
        .sep{border:none;border-top:1px solid rgba(255,255,255,.05);margin:10px 0}
    </style>
</head>
<body>
    <div class="wrap">
        <div id="container"></div>
        <div class="panel">
            <h3>⚙️ Settings</h3>
            
            <div class="row"><label>Cloth W</label><input type="range" id="sW" min="100" max="800" value="400"><input type="number" id="vW" value="400"></div>
            <div class="row"><label>Cloth H</label><input type="range" id="sH" min="100" max="600" value="400"><input type="number" id="vH" value="400"></div>
            <div class="row"><label>Cols</label><input type="range" id="sCols" min="10" max="80" value="50"><input type="number" id="vCols" value="50"></div>
            <div class="row"><label>Rows</label><input type="range" id="sRows" min="10" max="80" value="50"><input type="number" id="vRows" value="50"></div>
            <hr class="sep">
            <div class="row"><label>Gravity</label><input type="range" id="sGrav" min="0" max="1" step="0.01" value="0.2"><input type="number" id="vGrav" value="0.2"></div>
            <div class="row"><label>Damping</label><input type="range" id="sDamp" min="0.9" max="1" step="0.001" value="0.99"><input type="number" id="vDamp" value="0.99"></div>
            <div class="row"><label>Precision</label><input type="range" id="sIter" min="1" max="15" value="5"><input type="number" id="vIter" value="5"></div>
            <div class="row"><label>Stretch</label><input type="range" id="sStretch" min="1" max="3" step="0.01" value="1.1"><input type="number" id="vStretch" value="1.1"></div>
            <div class="row"><label>Compress</label><input type="range" id="sComp" min="0" max="0.5" step="0.01" value="0.02"><input type="number" id="vComp" value="0.02"></div>
            <hr class="sep">
            <div class="row"><label>Touch R</label><input type="range" id="sMR" min="500" max="15000" value="5000"><input type="number" id="vMR" value="5000"></div>
            <div class="row"><label>Touch F</label><input type="range" id="sMF" min="0.5" max="10" step="0.1" value="4"><input type="number" id="vMF" value="4"></div>
            <hr class="sep">
            <div class="row"><label>Roof W</label><input type="range" id="sRW" min="100" max="800" value="400"><input type="number" id="vRW" value="400"></div>
            <div class="row"><label>Roof Gap</label><input type="range" id="sRG" min="-100" max="50" value="-30"><input type="number" id="vRG" value="-30"></div>
            <div class="row"><label>Shadow</label><input type="range" id="sSh" min="0" max="30" value="8"><input type="number" id="vSh" value="8"></div>
            <hr class="sep">
            <button class="btn" id="rebuild">🔄 Rebuild</button>
        </div>
    </div>

    <script>
    // === UTILS ===
    function getPointID(row,col,gridH){return row+col*gridH}
    function smoothstep(e0,e1,x){const t=Math.max(0,Math.min(1,(x-e0)/(e1-e0)));return t*t*(3-2*t)}

    // === SETTINGS ===
    const S={aw:400,ah:400,cols:50,rows:50,grav:.2,damp:.99,iter:5,stretch:1.1,comp:.02,mouseR:5000,mouseF:4,roofW:400,roofGap:-30,shadow:8};

    // Bind sliders
    const pairs=[
        ['sW','vW','aw'],['sH','vH','ah'],['sCols','vCols','cols'],['sRows','vRows','rows'],
        ['sGrav','vGrav','grav'],['sDamp','vDamp','damp'],['sIter','vIter','iter'],
        ['sStretch','vStretch','stretch'],['sComp','vComp','comp'],
        ['sMR','vMR','mouseR'],['sMF','vMF','mouseF'],
        ['sRW','vRW','roofW'],['sRG','vRG','roofGap'],['sSh','vSh','shadow']
    ];
    pairs.forEach(([slider,input,key])=>{
        const s=document.getElementById(slider);
        const v=document.getElementById(input);
        s.addEventListener('input',()=>{v.value=s.value;S[key]=parseFloat(s.value);applyRoof()});
        v.addEventListener('input',()=>{s.value=v.value;S[key]=parseFloat(v.value);applyRoof()});
    });

    document.getElementById('rebuild').addEventListener('click',()=>init());

    // === PHYSICS ===
    class V{constructor(x=0,y=0){this.x=x;this.y=y}set(x,y){this.x=x;this.y=y}sub(v){return new V(this.x-v.x,this.y-v.y)}len(){return Math.hypot(this.x,this.y)}ang(){return Math.atan2(this.y,this.x)}}
    class P{constructor(x,y,pin,ch){this.pos=new V(x,y);this.old=new V(x,y);this.acc=new V();this.pin=pin;this.ch=ch;this.down=null}
        update(dt){if(this.pin){this.acc.set(0,0);return}const vx=(this.pos.x-this.old.x)*S.damp,vy=(this.pos.y-this.old.y)*S.damp;this.old.set(this.pos.x,this.pos.y);const d=dt*dt;this.acc.y+=S.grav/d;this.pos.x+=vx+this.acc.x*d;this.pos.y+=vy+this.acc.y*d;this.acc.set(0,0)}}
    class Cn{constructor(a,b,len,comp,stretch){this.a=a;this.b=b;this.len=len;this.min=len*comp;this.max=len*stretch}
        solve(){const dx=this.b.pos.x-this.a.pos.x,dy=this.b.pos.y-this.a.pos.y,d=Math.hypot(dx,dy);if(d===0)return;let t=this.len;if(d<this.min)t=this.min;else if(d>this.max)t=this.max;else return;const p=(t-d)/d/2;if(!this.a.pin){this.a.pos.x-=dx*p;this.a.pos.y-=dy*p}if(!this.b.pin){this.b.pos.x+=dx*p;this.b.pos.y+=dy*p}}}

    // === TEXT ===
    const TEXT='Black cats are mysterious and magical creatures that have captivated hearts for centuries. They are symbols of luck and good fortune. Their sleek dark fur glistens like midnight velvet. Their golden and green eyes pierce through the darkness. Every black cat holds a powerful wizard within. They have always been companions to witches. Only 13 percent of cats in the world are black. Their soft paws and gentle purrs calm the soul.';
    let canvas,ctx,particles,constraints,charImgs;

    function init(){
        S.aw=parseFloat(document.getElementById('vW').value);
        S.ah=parseFloat(document.getElementById('vH').value);
        S.cols=parseInt(document.getElementById('vCols').value);
        S.rows=parseInt(document.getElementById('vRows').value);

        const cont=document.getElementById('container');
        cont.innerHTML='';

        // Roof
        const roof=document.createElement('img');
        roof.src='images/roof.png';
        roof.style.cssText=`display:block;width:${S.roofW}px;height:auto;image-rendering:pixelated;margin-bottom:${S.roofGap}px;filter:drop-shadow(0 ${S.shadow}px ${S.shadow+4}px rgba(0,0,0,0.7));position:relative;z-index:2`;
        cont.appendChild(roof);

        // Canvas
        canvas=document.createElement('canvas');
        cont.appendChild(canvas);
        canvas.width=S.aw;canvas.height=S.ah;
        ctx=canvas.getContext('2d');

        particles=[];constraints=[];charImgs={};
        const fontSize=Math.max(8,S.ah/S.rows*1.1);
        const cellW=S.aw/(S.cols-1),cellH=S.ah/(S.rows-1);

        // Pre-render chars
        for(const ch of new Set(TEXT)){
            if(ch===' ')continue;
            const off=document.createElement('canvas');
            const s=Math.ceil(fontSize*1.4);
            off.width=off.height=s;
            const oc=off.getContext('2d');
            oc.font=`${fontSize}px "Noto Sans JP",sans-serif`;
            oc.textAlign='center';oc.textBaseline='middle';
            oc.fillStyle='#9b59b6';
            oc.fillText(ch,s/2,s/2);
            charImgs[ch]=off;
        }

        // Grid
        for(let i=0;i<S.cols;i++){
            for(let j=0;j<S.rows;j++){
                const x=i*cellW,y=j*cellH;
                const pin=j===0;
                const ci=(i+j*S.cols)%TEXT.length;
                particles.push(new P(x,y,pin,TEXT[ci]||' '));
            }
        }

        // Constraints
        for(let i=0;i<S.cols;i++){
            for(let j=0;j<S.rows;j++){
                const idx=j*S.cols+i;
                const p=particles[idx];
                if(j<S.rows-1){
                    const b=particles[(j+1)*S.cols+i];
                    const c=new Cn(p,b,cellH,S.comp,S.stretch);
                    constraints.push(c);p.down=c;
                }
                if(i<S.cols-1){
                    constraints.push(new Cn(p,particles[j*S.cols+i+1],cellW,.6,4));
                }
            }
        }

        // Mouse
        let mx=0,my=0,grabbed=null;
        canvas.onpointerdown=e=>{const r=canvas.getBoundingClientRect();mx=e.clientX-r.left;my=e.clientY-r.top;
            for(const p of particles){if(Math.hypot(mx-p.pos.x,my-p.pos.y)<20){grabbed=p;grabbed._pin=grabbed.pin;grabbed.pin=true;break}}};
        canvas.onpointerup=()=>{if(grabbed){grabbed.pin=grabbed._pin;grabbed=null}};
        canvas.onpointermove=e=>{const r=canvas.getBoundingClientRect();mx=e.clientX-r.left;my=e.clientY-r.top;
            if(grabbed){grabbed.pos.set(mx,my);grabbed.old.set(mx,my)}
            for(const p of particles){const dx=mx-p.pos.x,dy=my-p.pos.y,ls=dx*dx+dy*dy;
                if(ls<S.mouseR&&ls>0){const a=Math.atan2(dy,dx)-Math.PI,s=Math.max(0,1-ls/S.mouseR)*S.mouseF/300;p.acc.x+=Math.cos(a)*s;p.acc.y+=Math.sin(a)*s}}};
        canvas.oncontextmenu=e=>e.preventDefault();

        // Loop
        let last=0;
        function loop(t){
            requestAnimationFrame(loop);
            const dt=t-last;last=t;
            ctx.clearRect(0,0,canvas.width,canvas.height);
            particles.forEach(p=>p.update(dt));
            for(let i=0;i<S.iter;i++)constraints.forEach(c=>c.solve());
            particles.forEach(p=>{
                if(!p.ch||p.ch===' ')return;
                const con=p.down;let cos=1,sin=0;
                if(con){const dx=con.b.pos.x-con.a.pos.x,dy=con.b.pos.y-con.a.pos.y,a=Math.atan2(dy,dx)-Math.PI/2;cos=Math.cos(a);sin=Math.sin(a)}
                const img=charImgs[p.ch];if(!img)return;
                ctx.setTransform(cos,sin,-sin,cos,p.pos.x,p.pos.y);
                ctx.drawImage(img,-img.width/2,-img.height/2);
            });
            ctx.setTransform(1,0,0,1,0,0);
        }
        requestAnimationFrame(loop);
    }

    function applyRoof(){
        const roof=document.querySelector('#container img');
        if(roof){
            roof.style.width=S.roofW+'px';
            roof.style.marginBottom=S.roofGap+'px';
            roof.style.filter=`drop-shadow(0 ${S.shadow}px ${S.shadow+4}px rgba(0,0,0,0.7))`;
        }
    }

    setTimeout(init,200);
    </script>
</body>
</html>

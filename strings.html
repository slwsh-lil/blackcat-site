<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>گربه‌های سیاه | Interactive Strings</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;700&display=swap');
        @font-face{font-family:'QPixia';src:url('../fonts/q_pixia.ttf') format('truetype');font-display:swap}
        
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            background:#08090d;
            min-height:100vh;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            overflow:hidden;
            font-family:'Noto Naskh Arabic',monospace;
        }
        #container{
            position:relative;
            display:flex;
            align-items:center;
            justify-content:center;
            touch-action:none;
        }
        canvas{
            max-height:100vh;
            max-width:100vw;
        }
        .title{
            position:fixed;
            top:20px;
            left:50%;
            transform:translateX(-50%);
            font-family:'QPixia','Noto Naskh Arabic',monospace;
            font-size:clamp(1rem,3vw,1.5rem);
            color:rgba(155,89,182,.6);
            text-align:center;
            pointer-events:none;
            z-index:10;
        }
        .hint{
            position:fixed;
            bottom:20px;
            left:50%;
            transform:translateX(-50%);
            font-family:'Noto Naskh Arabic',monospace;
            font-size:.8rem;
            color:rgba(108,112,134,.5);
            pointer-events:none;
        }
        .back-btn{
            position:fixed;
            top:20px;
            left:20px;
            background:rgba(155,89,182,.15);
            border:1px solid rgba(155,89,182,.2);
            color:#b07cc6;
            padding:8px 16px;
            border-radius:6px;
            cursor:pointer;
            font-family:'Noto Naskh Arabic',monospace;
            font-size:.8rem;
            z-index:10;
            text-decoration:none;
            transition:all .3s;
        }
        .back-btn:hover{background:rgba(155,89,182,.25);border-color:rgba(155,89,182,.4)}
    </style>
</head>
<body>
    <a href="../index.html" class="back-btn">← بازگشت</a>
    <div class="title">🐈‍⬛ گربه‌های سیاه — طناب تعاملی</div>
    <div id="container"></div>
    <div class="hint">ماوس رو حرکت بده یا کلیک کن!</div>
    
    <script>
    /* ============================================
       BLACK CAT INTERACTIVE STRINGS
       Cloth physics simulation with Persian text
       ============================================ */
    
    const TEXT = "گربه‌های سیاه دوست‌داشتنی‌ترین موجودات روی زمین هستند ✦ جادو ✦ رازآلود ✦ زیبا ✦ ";
    const EMOJIS = ['🐈‍⬛','🖤','🌙','✨','🔮','👁️','🐾','⭐'];
    
    // Config
    const w = Math.min(500, window.innerWidth - 60);
    const h = Math.min(400, window.innerHeight - 100);
    const CONFIG = {
        awidth: w,
        aheight: h,
        gridW: Math.min(40, Math.floor(w / 12)),
        gridH: Math.min(30, Math.floor(h / 14)),
        gravity: 0.18,
        damping: 0.99,
        iterationsPerFrame: 5,
        compressFactor: 0.02,
        stretchFactor: 1.1,
        mouseSize: 4000,
        mouseStrength: 3,
        pointRadius: 1.5,
        contain: false
    };
    CONFIG.cellWidth = CONFIG.awidth / (CONFIG.gridW - 1);
    CONFIG.cellHeight = CONFIG.aheight / (CONFIG.gridH - 1);
    
    // Vector2 class
    class Vec2 {
        constructor(x=0, y=0) { this.reset(x, y); }
        reset(x=0, y=0) { this.x = x; this.y = y; }
        clone() { return new Vec2(this.x, this.y); }
        add(v) { this.x += v.x; this.y += v.y; return this; }
        addNew(v) { return this.clone().add(v); }
        subtract(v) { this.x -= v.x; this.y -= v.y; return this; }
        subtractNew(v) { return this.clone().subtract(v); }
        scale(s) { this.x *= s; this.y *= s; return this; }
        get lengthSquared() { return this.x**2 + this.y**2; }
        get length() { return Math.hypot(this.x, this.y); }
        get angle() { return Math.atan2(this.y, this.x); }
        get array() { return [this.x, this.y]; }
        [Symbol.iterator]() {
            let i = 0;
            const v = this.array;
            return { next: () => i < v.length ? {value: v[i++], done: false} : {done: true} };
        }
    }
    
    // Particle class
    class Particle {
        constructor({x, y, pinned, id, char}) {
            this.pos = new Vec2(x, y);
            this.oldPos = new Vec2(x, y);
            this.velocity = new Vec2();
            this.acceleration = new Vec2();
            this.pinned = pinned;
            this.id = id;
            this.char = char;
            this.downConstraint = null;
            this.gravityVec = new Vec2();
        }
        update(delta) {
            if (this.pinned) { this.acceleration.reset(); return; }
            this.velocity.reset(
                (this.pos.x - this.oldPos.x) * CONFIG.damping,
                (this.pos.y - this.oldPos.y) * CONFIG.damping
            );
            this.oldPos.reset(...this.pos);
            const dd = delta ** 2;
            this.gravityVec.reset(0, CONFIG.gravity / dd);
            this.applyForce(this.gravityVec);
            this.pos.x += this.velocity.x + this.acceleration.x * dd;
            this.pos.y += this.velocity.y + this.acceleration.y * dd;
            this.acceleration.reset();
        }
        applyForce(v) { this.acceleration.add(v); }
    }
    
    // Constraint class
    class Constraint {
        constructor({p1, p2, length, compressFactor, stretchFactor, isSpacer}) {
            this.p1 = p1; this.p2 = p2;
            this.length = length;
            this.minLength = length * compressFactor;
            this.maxLength = length * stretchFactor;
            this.isSpacer = isSpacer || false;
        }
        solve() {
            const dx = this.p2.pos.x - this.p1.pos.x;
            const dy = this.p2.pos.y - this.p1.pos.y;
            const distance = Math.hypot(dx, dy);
            if (distance === 0) return;
            let targetLength = this.length;
            if (distance < this.minLength) targetLength = this.minLength;
            else if (distance > this.maxLength) targetLength = this.maxLength;
            else return;
            const difference = targetLength - distance;
            const percent = difference / distance / 2;
            const offsetX = dx * percent;
            const offsetY = dy * percent;
            if (!this.p1.pinned) { this.p1.pos.x -= offsetX; this.p1.pos.y -= offsetY; }
            if (!this.p2.pinned) { this.p2.pos.x += offsetX; this.p2.pos.y += offsetY; }
        }
    }
    
    // Build full text
    let fullText = '';
    for (let i = 0; i < 50; i++) fullText += TEXT;
    for (let i = 0; i < 30; i++) fullText += EMOJIS[i % EMOJIS.length] + ' ';
    
    // Main
    function main() {
        const container = document.getElementById('container');
        const c = document.createElement('canvas');
        container.innerHTML = '';
        container.appendChild(c);
        c.width = window.innerWidth;
        c.height = window.innerHeight;
        const ctx = c.getContext('2d');
        
        const fontSize = Math.max(10, CONFIG.cellHeight * 1.1);
        
        // Pre-render characters
        const charCanvases = {};
        const chars = new Set(fullText);
        for (const ch of chars) {
            if (ch === ' ') continue;
            const off = document.createElement('canvas');
            off.width = off.height = Math.ceil(fontSize * 1.4);
            const octx = off.getContext('2d');
            octx.font = `${fontSize}px 'QPixia','Noto Naskh Arabic',monospace`;
            octx.textAlign = 'center';
            octx.textBaseline = 'middle';
            octx.fillStyle = '#b07cc6';
            octx.fillText(ch, off.width / 2, off.height / 2);
            charCanvases[ch] = off;
        }
        
        const particles = [];
        const constraints = [];
        
        // Create grid
        for (let i = 0; i < CONFIG.gridW; i++) {
            for (let j = 0; j < CONFIG.gridH; j++) {
                const x = i * CONFIG.cellWidth;
                const y = j * CONFIG.cellHeight;
                const id = j * CONFIG.gridW + i;
                const pinned = j === 0;
                const charIndex = (i + j * CONFIG.gridW) % fullText.length;
                const char = fullText[charIndex] || ' ';
                const particle = new Particle({x, y, pinned, id, char});
                particles.push(particle);
            }
        }
        
        // Create constraints
        for (let i = 0; i < CONFIG.gridW; i++) {
            for (let j = 0; j < CONFIG.gridH; j++) {
                const id = j * CONFIG.gridW + i;
                const p = particles[id];
                
                if (j < CONFIG.gridH - 1) {
                    const bottomP = particles[(j + 1) * CONFIG.gridW + i];
                    const c = new Constraint({
                        p1: p, p2: bottomP,
                        length: CONFIG.cellHeight,
                        compressFactor: CONFIG.compressFactor,
                        stretchFactor: CONFIG.stretchFactor
                    });
                    constraints.push(c);
                    p.downConstraint = c;
                }
                
                if (i < CONFIG.gridW - 1) {
                    const rightP = particles[j * CONFIG.gridW + i + 1];
                    const hc = new Constraint({
                        p1: p, p2: rightP,
                        length: CONFIG.cellWidth,
                        compressFactor: 0.6,
                        stretchFactor: 4,
                        isSpacer: true
                    });
                    constraints.push(hc);
                }
            }
        }
        
        // Input handling
        let mousePos = new Vec2();
        let grabbedParticle = null;
        const grabRadius = 20;
        
        function getMousePos(e) {
            const rect = c.getBoundingClientRect();
            return new Vec2(
                e.clientX - c.width / 2 + CONFIG.awidth / 2,
                e.clientY - c.height / 2 + CONFIG.aheight / 2
            );
        }
        
        c.addEventListener('pointerdown', (e) => {
            mousePos = getMousePos(e);
            for (const p of particles) {
                if (mousePos.subtractNew(p.pos).length < grabRadius) {
                    grabbedParticle = p;
                    grabbedParticle.originalPinned = grabbedParticle.pinned;
                    grabbedParticle.pinned = true;
                    break;
                }
            }
        });
        
        c.addEventListener('pointerup', () => {
            if (grabbedParticle) {
                grabbedParticle.pinned = grabbedParticle.originalPinned;
                grabbedParticle = null;
            }
        });
        
        c.addEventListener('pointermove', (e) => {
            mousePos = getMousePos(e);
            if (grabbedParticle) {
                grabbedParticle.pos.reset(mousePos.x, mousePos.y);
                grabbedParticle.oldPos.reset(mousePos.x, mousePos.y);
            }
            for (const p of particles) {
                const diff = mousePos.subtractNew(p.pos);
                const ls = diff.lengthSquared;
                if (ls < CONFIG.mouseSize) {
                    const a = diff.angle - Math.PI;
                    const strength = Math.max(0, 1 - ls / CONFIG.mouseSize) * CONFIG.mouseStrength / 300;
                    p.applyForce(new Vec2(Math.cos(a) * strength, Math.sin(a) * strength));
                }
            }
        });
        
        c.addEventListener('contextmenu', (e) => e.preventDefault());
        
        // Animation loop
        let lastDelta = 0;
        function runloop(delta) {
            requestAnimationFrame(runloop);
            ctx.clearRect(0, 0, c.width, c.height);
            
            particles.forEach(p => p.update(delta - lastDelta));
            lastDelta = delta;
            
            for (let i = 0; i < CONFIG.iterationsPerFrame; i++) {
                constraints.forEach(c => c.solve());
            }
            
            // Draw characters
            const offset = [c.width / 2 - CONFIG.awidth / 2, c.height / 2 - CONFIG.aheight / 2 - 20];
            particles.forEach(p => {
                if (p.char && p.char !== ' ') {
                    const constraint = p.downConstraint;
                    let cos = 1, sin = 0;
                    if (constraint) {
                        const dx = constraint.p2.pos.x - constraint.p1.pos.x;
                        const dy = constraint.p2.pos.y - constraint.p1.pos.y;
                        const angle = Math.atan2(dy, dx) - Math.PI / 2;
                        cos = Math.cos(angle);
                        sin = Math.sin(angle);
                    }
                    const img = charCanvases[p.char];
                    if (!img) return;
                    const half = img.width / 2;
                    ctx.setTransform(cos, sin, -sin, cos, p.pos.x + offset[0], p.pos.y + offset[1]);
                    ctx.drawImage(img, -half, -half);
                }
            });
            
            ctx.setTransform(1, 0, 0, 1, 0, 0);
        }
        requestAnimationFrame(runloop);
    }
    
    setTimeout(main, 300);
    </script>
</body>
</html>

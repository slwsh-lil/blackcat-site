<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>糸 | Strings</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            background:#08090d;
            width:100vw;
            height:100vh;
            overflow:hidden;
            cursor:crosshair;
        }
        canvas{display:block}
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    <script>
    /* ============================================
       INTERACTIVE CLOTH STRINGS
       Japanese text on physics cloth
       ============================================ */

    // Japanese text - travel quotes
    const TEXT = [
        '旅は到着ではなく道そのものだ',
        '遠くへ行けば自分に出会う',
        '迷う者すべてが失われるわけではない',
        '人生を逃れるためではなく人生に逃げられないために旅をする',
        '港にいれば船は安全だがそれでは船を造った意味がない',
        '世界は一冊の本だ旅をせぬ者はただ一頁を読むのみ',
        '冒険はそれ自体が価値である',
        '旅をすることは生きることだ',
        '仕事は懐を満たし冒険は魂を満たす',
        '行くところへは心を込めて行け',
        '真の発見の旅は新しい景色を求めることではない',
        '人生は大胆な冒険でなければ何ものでもない',
        '旅は人を謙虚にする',
        '岸を見失う勇気なくして新しい海は見つからない',
        '上手に旅をすることが到着することに勝る',
        '年に一度は行ったことのない場所へ行け',
        '未知の地へ発つ瞬間こそ人生で最も喜ばしい',
        '旅は言葉を奪いそして語り部にする',
        '一期一会',
        '風鈴',
    ].join('　');

    const EMOJIS = ['🏮','⛩️','🌸','🎋','🏯','🎐','🌙','✨','🍃','🈹'];

    // Config
    const W = Math.min(600, window.innerWidth);
    const H = Math.min(500, window.innerHeight);
    const CFG = {
        w: W, h: H,
        cols: Math.min(50, Math.floor(W / 10)),
        rows: Math.min(40, Math.floor(H / 12)),
        gravity: 0.18,
        damping: 0.99,
        iterations: 8,
        compress: 0.02,
        stretch: 1.1,
        mouseRadius: 5000,
        mouseForce: 3.5
    };
    CFG.cellW = CFG.w / (CFG.cols - 1);
    CFG.cellH = CFG.h / (CFG.rows - 1);

    // Vector
    class V {
        constructor(x=0,y=0){this.x=x;this.y=y}
        set(x,y){this.x=x;this.y=y}
        sub(v){return new V(this.x-v.x,this.y-v.y)}
        len(){return Math.hypot(this.x,this.y)}
        ang(){return Math.atan2(this.y,this.x)}
    }

    // Particle
    class P {
        constructor(x,y,pin,char){
            this.pos=new V(x,y);
            this.old=new V(x,y);
            this.acc=new V();
            this.pin=pin;
            this.char=char;
            this.down=null;
        }
        update(dt){
            if(this.pin){this.acc.set(0,0);return}
            const vx=(this.pos.x-this.old.x)*CFG.damping;
            const vy=(this.pos.y-this.old.y)*CFG.damping;
            this.old.set(this.pos.x,this.pos.y);
            const d=dt*dt;
            this.acc.y+=CFG.gravity/d;
            this.pos.x+=vx+this.acc.x*d;
            this.pos.y+=vy+this.acc.y*d;
            this.acc.set(0,0);
        }
    }

    // Constraint
    class C {
        constructor(a,b,len,comp,stretch){
            this.a=a;this.b=b;this.len=len;
            this.min=len*comp;this.max=len*stretch;
        }
        solve(){
            const dx=this.b.pos.x-this.a.pos.x;
            const dy=this.b.pos.y-this.a.pos.y;
            const d=Math.hypot(dx,dy);
            if(d===0)return;
            let t=this.len;
            if(d<this.min)t=this.min;
            else if(d>this.max)t=this.max;
            else return;
            const p=(t-d)/d/2;
            if(!this.a.pin){this.a.pos.x-=dx*p;this.a.pos.y-=dy*p}
            if(!this.b.pin){this.b.pos.x+=dx*p;this.b.pos.y+=dy*p}
        }
    }

    // Build text
    let fullText=TEXT;
    for(let i=0;i<30;i++)fullText+=EMOJIS[i%EMOJIS.length]+' ';

    const canvas=document.getElementById('c');
    const ctx=canvas.getContext('2d');
    let particles=[],constraints=[],charImgs={};

    function init(){
        canvas.width=window.innerWidth;
        canvas.height=window.innerHeight;
        particles=[];constraints=[];charImgs={};

        const fontSize=Math.max(8,CFG.cellH*1.15);

        // Pre-render chars
        const chars=new Set(fullText);
        for(const ch of chars){
            if(ch===' ')continue;
            const off=document.createElement('canvas');
            const s=Math.ceil(fontSize*1.5);
            off.width=off.height=s;
            const oc=off.getContext('2d');
            oc.font=`${fontSize}px sans-serif`;
            oc.textAlign='center';
            oc.textBaseline='middle';
            oc.fillStyle='#9b59b6';
            oc.fillText(ch,s/2,s/2);
            charImgs[ch]=off;
        }

        // Grid
        for(let i=0;i<CFG.cols;i++){
            for(let j=0;j<CFG.rows;j++){
                const x=i*CFG.cellW;
                const y=j*CFG.cellH;
                const idx=j*CFG.cols+i;
                const pin=j===0;
                const ci=(i+j*CFG.cols)%fullText.length;
                const ch=fullText[ci]||' ';
                particles.push(new P(x,y,pin,ch));
            }
        }

        // Constraints
        for(let i=0;i<CFG.cols;i++){
            for(let j=0;j<CFG.rows;j++){
                const idx=j*CFG.cols+i;
                const p=particles[idx];
                if(j<CFG.rows-1){
                    const b=particles[(j+1)*CFG.cols+i];
                    const c=new C(p,b,CFG.cellH,CFG.compress,CFG.stretch);
                    constraints.push(c);
                    p.down=c;
                }
                if(i<CFG.cols-1){
                    const r=particles[j*CFG.cols+i+1];
                    constraints.push(new C(p,r,CFG.cellW,0.6,4));
                }
            }
        }
    }

    // Mouse
    let mx=0,my=0,grabbed=null;

    canvas.onpointerdown=e=>{
        const r=canvas.getBoundingClientRect();
        mx=e.clientX-r.left;my=e.clientY-r.top;
        for(const p of particles){
            if(Math.hypot(mx-p.pos.x,my-p.pos.y)<20){
                grabbed=p;grabbed._pin=grabbed.pin;grabbed.pin=true;
                break;
            }
        }
    };
    canvas.onpointerup=()=>{if(grabbed){grabbed.pin=grabbed._pin;grabbed=null}};
    canvas.onpointermove=e=>{
        const r=canvas.getBoundingClientRect();
        mx=e.clientX-r.left;my=e.clientY-r.top;
        if(grabbed){grabbed.pos.set(mx,my);grabbed.old.set(mx,my)}
        for(const p of particles){
            const dx=mx-p.pos.x,dy=my-p.pos.y;
            const ls=dx*dx+dy*dy;
            if(ls<CFG.mouseRadius&&ls>0){
                const a=Math.atan2(dy,dx)-Math.PI;
                const s=Math.max(0,1-ls/CFG.mouseRadius)*CFG.mouseForce/300;
                p.acc.x+=Math.cos(a)*s;
                p.acc.y+=Math.sin(a)*s;
            }
        }
    };
    canvas.oncontextmenu=e=>e.preventDefault();

    // Resize
    window.onresize=()=>{
        CFG.w=Math.min(600,window.innerWidth);
        CFG.h=Math.min(500,window.innerHeight);
        CFG.cols=Math.min(50,Math.floor(CFG.w/10));
        CFG.rows=Math.min(40,Math.floor(CFG.h/12));
        CFG.cellW=CFG.w/(CFG.cols-1);
        CFG.cellH=CFG.h/(CFG.rows-1);
        init();
    };

    // Loop
    let last=0;
    function loop(t){
        requestAnimationFrame(loop);
        const dt=t-last;last=t;

        ctx.clearRect(0,0,canvas.width,canvas.height);

        particles.forEach(p=>p.update(dt));
        for(let i=0;i<CFG.iterations;i++)constraints.forEach(c=>c.solve());

        const ox=canvas.width/2-CFG.w/2;
        const oy=canvas.height/2-CFG.h/2-20;

        particles.forEach(p=>{
            if(!p.char||p.char===' ')return;
            const con=p.down;
            let cos=1,sin=0;
            if(con){
                const dx=con.b.pos.x-con.a.pos.x;
                const dy=con.b.pos.y-con.a.pos.y;
                const a=Math.atan2(dy,dx)-Math.PI/2;
                cos=Math.cos(a);sin=Math.sin(a);
            }
            const img=charImgs[p.char];
            if(!img)return;
            const half=img.width/2;
            ctx.setTransform(cos,sin,-sin,cos,p.pos.x+ox,p.pos.y+oy);
            ctx.drawImage(img,-half,-half);
        });
        ctx.setTransform(1,0,0,1,0,0);
    }

    init();
    requestAnimationFrame(loop);
    </script>
</body>
</html>
